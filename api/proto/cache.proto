syntax = "proto3";

package cachepb;

option go_package = "newCache/api/proto;cachepb";

service CacheService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Set(SetRequest) returns (SetResponse);
}

message GetRequest {
  string group = 1;
  string key   = 2;
}

message GetResponse {
  bytes value = 1;
}

message SetRequest {
  string group     = 1;
  string key       = 2;
  bytes  value     = 3;
  bool   from_peer = 4;
}

message SetResponse {
  bool ok = 1;
}
